<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cadeau des mariés — Reine &amp; Christian</title>
<meta name="description" content="Nos coordonnées pour celles et ceux qui souhaitent participer — Reine & Christian.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{
  --ivoire:#FBF7EF;--sable:#EADFC9;--sable-clair:#F3ECDD;
  --terracotta:#C2693F;--chocolat:#3E2417;--chocolat-doux:#5B3A28;
  --or:#B08D57;--or-pale:#D8C29A;
}
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{
  font-family:'Jost',sans-serif;font-weight:300;color:var(--chocolat);
  min-height:100vh;line-height:1.7;
  display:flex;align-items:center;justify-content:center;padding:34px 16px;
  position:relative;overflow-x:hidden;
}
/* ---- Fond : photo des mariés ---- */
.fond{position:fixed;inset:0;z-index:-2;background:#2a160c}
.fond img{width:100%;height:100%;object-fit:cover;object-position:center 18%;filter:saturate(.98)}
.fond::after{
  content:'';position:absolute;inset:0;
  background:
    radial-gradient(130% 100% at 50% 16%, rgba(255,255,255,.05), rgba(40,25,15,.16) 72%, rgba(28,15,8,.34) 100%),
    linear-gradient(180deg, rgba(28,15,8,.05), rgba(28,15,8,.18));
}
::selection{background:var(--terracotta);color:var(--ivoire)}

.carte{
  position:relative;width:100%;max-width:540px;
  background:
    linear-gradient(180deg, rgba(255,255,255,.22), rgba(255,255,255,.08) 30%, rgba(255,255,255,.10) 100%);
  border:1px solid rgba(255,255,255,.35);border-radius:34px;
  box-shadow:
    inset 0 1.5px 0 rgba(255,255,255,.7),
    inset 0 -1px 1px rgba(255,255,255,.18),
    inset 0 0 0 1px rgba(255,255,255,.06),
    0 24px 70px rgba(10,8,20,.42);
  padding:clamp(28px,5vw,48px) clamp(20px,4vw,38px) clamp(26px,4vw,40px);
  text-align:center;overflow:hidden;
  backdrop-filter:blur(20px) saturate(1.8);
  -webkit-backdrop-filter:blur(20px) saturate(1.8);
}
/* Reflet spéculaire « liquid glass » (haut du verre) */
.carte::before{
  content:'';position:absolute;inset:0;pointer-events:none;border-radius:inherit;
  background:
    radial-gradient(120% 60% at 50% -10%, rgba(255,255,255,.35), rgba(255,255,255,0) 60%),
    linear-gradient(135deg, rgba(255,255,255,.22) 0%, rgba(255,255,255,0) 32%);
}
/* ---- Alliances (motif signature, en filigrane) ---- */
.alliances{
  width:96px;height:62px;margin:0 auto 14px;display:block;opacity:.95;
}
.mono{
  font-family:'Cormorant Garamond',serif;font-style:italic;
  letter-spacing:.18em;color:#8c6a36;font-size:1.18rem;margin-bottom:6px;
  text-shadow:0 1px 2px rgba(255,255,255,.6),0 0 10px rgba(255,255,255,.45);
}
.eyebrow{
  font-size:.78rem;letter-spacing:.32em;text-transform:uppercase;font-weight:500;
  color:#a6492a;text-indent:.32em;margin-bottom:8px;
  text-shadow:0 1px 2px rgba(255,255,255,.6),0 0 8px rgba(255,255,255,.4);
}
h1{
  font-family:'Cormorant Garamond',serif;font-weight:600;color:#311b0e;
  font-size:clamp(2.1rem,6.5vw,2.7rem);line-height:1.1;margin-bottom:12px;
  text-shadow:0 1px 3px rgba(255,255,255,.6),0 0 14px rgba(255,255,255,.5);
}
.verset{
  font-family:'Cormorant Garamond',serif;font-style:italic;
  color:#190b03;font-size:1.18rem;line-height:1.6;font-weight:600;
  max-width:420px;margin:0 auto 8px;
  text-shadow:0 1px 2px rgba(255,255,255,.7),0 0 10px rgba(255,255,255,.55);
}
.filet{width:42px;height:1px;background:var(--or);margin:18px auto 24px;position:relative}
.filet::before,.filet::after{content:'';position:absolute;top:-2px;width:5px;height:5px;border-radius:50%;background:var(--or);transform:rotate(45deg)}
.filet::before{left:-9px}.filet::after{right:-9px}

.liste{display:flex;flex-direction:column;gap:12px;text-align:left}
.moyen{
  display:flex;align-items:center;gap:14px;
  background:linear-gradient(180deg, rgba(255,255,255,.62), rgba(255,255,255,.46));
  border:1px solid rgba(255,255,255,.55);border-radius:22px;
  box-shadow:inset 0 1px 0 rgba(255,255,255,.85), 0 2px 10px rgba(10,8,20,.10);
  padding:15px 15px;transition:border-color .25s,transform .2s,box-shadow .25s,background .25s;
  backdrop-filter:blur(12px) saturate(1.6);-webkit-backdrop-filter:blur(12px) saturate(1.6);
}
.moyen:hover{background:linear-gradient(180deg, rgba(255,255,255,.78), rgba(255,255,255,.62));border-color:var(--or);transform:translateY(-1px);box-shadow:inset 0 1px 0 rgba(255,255,255,.9),0 10px 26px rgba(62,36,23,.16)}
.ico{
  flex:0 0 46px;width:46px;height:46px;border-radius:13px;overflow:hidden;
  border:1px solid rgba(255,255,255,.7);background:#fff;
  box-shadow:inset 0 1px 0 rgba(255,255,255,.9), 0 2px 6px rgba(10,8,20,.14);
  display:flex;align-items:center;justify-content:center;color:var(--chocolat-doux);
}
.ico img{width:100%;height:100%;object-fit:cover;display:block}
.ico svg{width:21px;height:21px}
.infos{flex:1;min-width:0}
.moyen .nom{font-size:.8rem;letter-spacing:.14em;text-transform:uppercase;color:#3E2417;font-weight:500;text-indent:.14em}
.moyen .val{font-size:1.15rem;color:#241208;font-weight:500;word-break:break-word}
.moyen .note{font-size:.85rem;color:#5B3A28;margin-top:2px}
.copier{
  flex:0 0 auto;border:1px solid rgba(62,36,23,.25);
  background:linear-gradient(180deg, rgba(255,255,255,.55), rgba(255,255,255,.3));
  color:var(--chocolat);box-shadow:inset 0 1px 0 rgba(255,255,255,.8);
  font-family:'Jost',sans-serif;font-size:.68rem;letter-spacing:.16em;text-transform:uppercase;font-weight:500;
  padding:10px 15px;border-radius:30px;cursor:pointer;transition:all .25s;white-space:nowrap;
  -webkit-backdrop-filter:blur(6px);backdrop-filter:blur(6px);
}
.copier:hover{background:var(--chocolat);color:var(--ivoire);border-color:var(--chocolat)}
.copier.ok{background:var(--terracotta);border-color:var(--terracotta);color:#fff}
.copier.muet{opacity:.4;cursor:not-allowed;border-style:dashed}
.copier.muet:hover{background:transparent;color:var(--chocolat)}
.val.attente{color:#5B3A28;font-style:italic;font-size:1.05rem}

.merci{margin-top:26px;font-family:'Cormorant Garamond',serif;font-style:italic;font-size:1.25rem;color:#2c1810;font-weight:500;text-shadow:0 1px 2px rgba(255,255,255,.6),0 0 10px rgba(255,255,255,.45)}
.retour{
  display:inline-flex;align-items:center;gap:8px;margin-top:22px;
  font-size:.82rem;letter-spacing:.18em;text-transform:uppercase;text-indent:.18em;font-weight:500;
  color:#a6492a;text-decoration:none;
  text-shadow:0 1px 2px rgba(255,255,255,.55);
}
.retour:hover{color:var(--chocolat)}
.retour svg{width:14px;height:14px}

/* ============ RESPONSIVE ============ */
/* Téléphone */
@media(max-width:480px){
  body{padding:18px 12px}
  .carte{border-radius:18px}
  .moyen{flex-wrap:wrap;gap:12px;padding:14px 13px}
  .infos{flex:1 1 calc(100% - 58px)}
  .copier{order:3;margin-left:58px;margin-top:4px}
  .verset{font-size:1.1rem}
  .moyen .nom{font-size:.76rem;letter-spacing:.1em}
  .moyen .val{font-size:1.12rem}
}
/* Tablette */
@media(min-width:481px) and (max-width:1024px){
  body{padding:40px 28px}
  .carte{max-width:600px}
}
/* PC / grand écran */
@media(min-width:1025px){
  body{padding:56px 32px}
  .carte{max-width:580px}
}
/* Très grand écran */
@media(min-width:1440px){
  .carte{max-width:620px}
}
</style>
</head>

var liste = document.getElementById("liste");
MOYENS.forEach(function(m){
  var rempli = m.valeur && m.valeur.trim();
  var row = document.createElement("div");
  row.className = "moyen";
  row.innerHTML =
    '<div class="ico">'+m.ico+'</div>'+
    '<div class="infos">'+
      '<div class="nom">'+m.nom+'</div>'+
      (rempli
        ? '<div class="val">'+m.valeur+'</div>'
        : '<div class="val attente">À communiquer</div>')+
      (m.note ? '<div class="note">'+m.note+'</div>' : '')+
    '</div>'+
    (rempli
      ? '<button class="copier" type="button">Copier</button>'
      : '<button class="copier muet" type="button" disabled>Bientôt</button>');
  if(rempli){
    var btn = row.querySelector(".copier");
    btn.addEventListener("click", function(){
      navigator.clipboard.writeText(m.valeur).then(function(){
        btn.textContent = "Copié ✔"; btn.classList.add("ok");
        setTimeout(function(){ btn.textContent="Copier"; btn.classList.remove("ok"); }, 1800);
      }).catch(function(){
        btn.textContent = "Sélectionnez";
      });
    });
  }
  liste.appendChild(row);
});
</script>
