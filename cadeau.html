<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cadeau des mariés — Reine &amp; Christian</title>
<meta name="description" content="Nos coordonnées pour celles et ceux qui souhaitent participer — Reine & Christian.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{
  --ivoire:#FBF7EF;--sable:#EADFC9;--sable-clair:#F3ECDD;
  --terracotta:#C2693F;--chocolat:#3E2417;--chocolat-doux:#5B3A28;
  --or:#B08D57;--or-pale:#D8C29A;
}
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{
  font-family:'Jost',sans-serif;font-weight:300;color:var(--chocolat);
  min-height:100vh;line-height:1.7;
  display:flex;align-items:center;justify-content:center;padding:34px 16px;
  position:relative;overflow-x:hidden;
}
/* ---- Fond : photo des mariés ---- */
.fond{position:fixed;inset:0;z-index:-2;background:#2a160c}
.fond img{width:100%;height:100%;object-fit:cover;object-position:center 22%;filter:saturate(.96)}
.fond::after{
  content:'';position:absolute;inset:0;
  background:
    radial-gradient(120% 90% at 50% 0%, rgba(62,36,23,.30), rgba(62,36,23,.74) 70%, rgba(28,15,8,.92) 100%),
    linear-gradient(180deg, rgba(28,15,8,.25), rgba(28,15,8,.55));
}
::selection{background:var(--terracotta);color:var(--ivoire)}

.carte{
  position:relative;width:100%;max-width:540px;
  background:rgba(251,247,239,.97);
  border:1px solid var(--or-pale);border-radius:22px;
  box-shadow:0 30px 80px rgba(20,10,4,.55);
  padding:40px 30px 34px;text-align:center;
  backdrop-filter:blur(2px);
}
/* ---- Alliances (motif signature, en filigrane) ---- */
.alliances{
  width:96px;height:62px;margin:0 auto 14px;display:block;opacity:.95;
}
.mono{
  font-family:'Cormorant Garamond',serif;font-style:italic;
  letter-spacing:.18em;color:var(--or);font-size:1.05rem;margin-bottom:6px;
}
.eyebrow{
  font-size:.7rem;letter-spacing:.34em;text-transform:uppercase;
  color:var(--terracotta);text-indent:.34em;margin-bottom:8px;
}
h1{
  font-family:'Cormorant Garamond',serif;font-weight:500;
  font-size:clamp(1.9rem,6vw,2.5rem);line-height:1.1;margin-bottom:12px;
}
.verset{
  font-family:'Cormorant Garamond',serif;font-style:italic;
  color:var(--chocolat-doux);font-size:1.05rem;line-height:1.5;
  max-width:400px;margin:0 auto 8px;
}
.filet{width:42px;height:1px;background:var(--or);margin:18px auto 24px;position:relative}
.filet::before,.filet::after{content:'';position:absolute;top:-2px;width:5px;height:5px;border-radius:50%;background:var(--or);transform:rotate(45deg)}
.filet::before{left:-9px}.filet::after{right:-9px}

.liste{display:flex;flex-direction:column;gap:12px;text-align:left}
.moyen{
  display:flex;align-items:center;gap:14px;
  background:#fff;border:1px solid var(--sable);border-radius:14px;
  padding:14px 14px;transition:border-color .25s,transform .2s,box-shadow .25s;
}
.moyen:hover{border-color:var(--or);transform:translateY(-1px);box-shadow:0 10px 26px rgba(62,36,23,.10)}
.ico{
  flex:0 0 42px;width:42px;height:42px;border-radius:11px;
  background:var(--sable-clair);border:1px solid var(--sable);
  display:flex;align-items:center;justify-content:center;color:var(--chocolat-doux);
}
.ico svg{width:21px;height:21px}
.infos{flex:1;min-width:0}
.moyen .nom{font-size:.74rem;letter-spacing:.16em;text-transform:uppercase;color:var(--chocolat-doux);text-indent:.16em}
.moyen .val{font-size:1.04rem;color:var(--chocolat);font-weight:400;word-break:break-word}
.moyen .note{font-size:.78rem;color:var(--or);margin-top:1px}
.copier{
  flex:0 0 auto;border:1px solid var(--chocolat);background:transparent;color:var(--chocolat);
  font-family:'Jost',sans-serif;font-size:.66rem;letter-spacing:.16em;text-transform:uppercase;
  padding:9px 12px;border-radius:30px;cursor:pointer;transition:all .25s;white-space:nowrap;
}
.copier:hover{background:var(--chocolat);color:var(--ivoire)}
.copier.ok{background:var(--terracotta);border-color:var(--terracotta);color:#fff}
.copier.muet{opacity:.4;cursor:not-allowed;border-style:dashed}
.copier.muet:hover{background:transparent;color:var(--chocolat)}
.val.attente{color:var(--chocolat-doux);font-style:italic;font-size:.95rem}

.merci{margin-top:26px;font-family:'Cormorant Garamond',serif;font-style:italic;font-size:1.1rem;color:var(--chocolat-doux)}
.retour{
  display:inline-flex;align-items:center;gap:8px;margin-top:22px;
  font-size:.74rem;letter-spacing:.2em;text-transform:uppercase;text-indent:.2em;
  color:var(--terracotta);text-decoration:none;
}
.retour:hover{color:var(--chocolat)}
.retour svg{width:14px;height:14px}

@media(max-width:480px){
  .carte{padding:34px 20px 28px}
  .moyen{flex-wrap:wrap}
  .copier{order:3;margin-left:56px}
}
</style>
</head>

<script>
/* ============================================================
   COORDONNÉES — modifiez librement les valeurs ci-dessous.
   Mettez la vraie valeur à la place de "" pour PayPal,
   Orange Money et MTN MoMo quand vous les aurez.
   ============================================================ */
var MOYENS = [
  {
    nom:"PayPal", note:"E-mail / lien PayPal",
    valeur:"",                       /* ← à compléter (ex. reinedouanla19@gmail.com) */
    ico:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M6 21l2-13h6a4 4 0 0 1 0 8H9"/><path d="M8 17h5a4 4 0 0 0 0-8"/></svg>'
  },
  {
    nom:"Wero", note:"Par numéro de téléphone",
    valeur:"+33 7 81 67 23 19",
    ico:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="6" y="2" width="12" height="20" rx="2.5"/><path d="M11 18h2"/></svg>'
  },
  {
    nom:"Virement Interac", note:"Depuis le Canada",
    valeur:"reinedouanla19@gmail.com",
    ico:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="5" width="18" height="14" rx="2"/><path d="M3 9h18"/></svg>'
  },
  {
    nom:"Orange Money", note:"Cameroun",
    valeur:"",                       /* ← à compléter */
    ico:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="9"/><path d="M8 12h8M12 8v8"/></svg>'
  },
  {
    nom:"MTN MoMo", note:"Cameroun",
    valeur:"",                       /* ← à compléter */
    ico:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="9"/><path d="M8 12h8M12 8v8"/></svg>'
  }
];

var liste = document.getElementById("liste");
MOYENS.forEach(function(m){
  var rempli = m.valeur && m.valeur.trim();
  var row = document.createElement("div");
  row.className = "moyen";
  row.innerHTML =
    '<div class="ico">'+m.ico+'</div>'+
    '<div class="infos">'+
      '<div class="nom">'+m.nom+'</div>'+
      (rempli
        ? '<div class="val">'+m.valeur+'</div>'
        : '<div class="val attente">À communiquer</div>')+
      (m.note ? '<div class="note">'+m.note+'</div>' : '')+
    '</div>'+
    (rempli
      ? '<button class="copier" type="button">Copier</button>'
      : '<button class="copier muet" type="button" disabled>Bientôt</button>');
  if(rempli){
    var btn = row.querySelector(".copier");
    btn.addEventListener("click", function(){
      navigator.clipboard.writeText(m.valeur).then(function(){
        btn.textContent = "Copié ✔"; btn.classList.add("ok");
        setTimeout(function(){ btn.textContent="Copier"; btn.classList.remove("ok"); }, 1800);
      }).catch(function(){
        btn.textContent = "Sélectionnez";
      });
    });
  }
  liste.appendChild(row);
});
</script>
